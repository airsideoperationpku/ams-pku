<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Center - AMS PKU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; height: 100vh; overflow: hidden; }
        .sidebar { min-width: 250px; max-width: 250px; background-color: #ffffff; border-right: 1px solid #eaeaea; display: flex; flex-direction: column; transition: all 0.3s ease; z-index: 1050; }
        .sidebar.collapsed { margin-left: -250px; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 1040; transition: opacity 0.3s ease; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid #f0f0f0; margin-bottom: 15px; }
        .sidebar-header h5 { margin: 0; font-weight: 700; color: #2c3e50; font-size: 1.1rem; }
        .nav-link { color: #666; font-weight: 500; padding: 12px 20px; margin: 4px 15px; border-radius: 8px; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover, .nav-link.active { background-color: #e8f0fe; color: #0d6efd; }
        
        .content { flex-grow: 1; padding: 20px 30px; overflow-y: auto; min-width: 0; transition: all 0.3s ease; }
        
        .nav-tabs .nav-link { color: #6c757d; font-weight: 600; border: none; padding: 12px 25px; border-bottom: 3px solid transparent; transition: 0.3s; }
        .nav-tabs .nav-link.active { color: #0d6efd; border-bottom: 3px solid #0d6efd; background: transparent; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); background: #fff; padding: 25px; }
        
        .preview-container { border-radius: 10px; overflow: hidden; border: 1px solid #dee2e6; margin-top: 15px; max-height: 400px; }
        .table-preview { font-size: 0.75rem; white-space: nowrap; }
        .table-preview thead { position: sticky; top: 0; background: #f8f9fa; z-index: 2; }
        
        .check-group { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        .form-check-label { font-size: 0.85rem; font-weight: 500; }

        @media (max-width: 768px) { .sidebar { position: fixed; left: -250px; height: 100vh; } .sidebar.show { left: 0; box-shadow: 2px 0 15px rgba(0,0,0,0.2); } .sidebar-overlay.show { display: block; } .content { padding: 15px; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><h5>AMS PKU</h5><small>Sultan Syarif Kasim II</small></div>
        <div class="nav flex-column">
            <a href="dashboard.html" class="nav-link"><i class="bi bi-pie-chart-fill"></i> Dashboard</a>
            <a href="ams.html" class="nav-link"><i class="bi bi-grid-1x2"></i> Apron Management</a>
            <a href="database.html" class="nav-link"><i class="bi bi-database"></i> Data Master</a>
            <a href="parking.html" class="nav-link"><i class="bi bi-p-circle-fill"></i> Parking Stand</a>
            <a href="#" class="nav-link active"><i class="bi bi-cloud-arrow-down-fill"></i> Download Center</a>
        </div>
        <div class="mt-auto mb-4 px-3">
            <button class="btn btn-outline-danger w-100 fw-bold" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
        </div>
    </nav>

    <div class="content">
        <div class="d-flex align-items-center mb-4">
            <button class="btn btn-light border shadow-sm px-2 py-1 me-3" onclick="toggleSidebar()"><i class="bi bi-list fs-4 text-dark"></i></button>
            <h4 class="fw-bold text-dark m-0">Download Center</h4>
        </div>

        <ul class="nav nav-tabs mb-4" id="downloadTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="export-tab" data-bs-toggle="tab" data-bs-target="#export-pane" type="button"><i class="bi bi-file-earmark-spreadsheet me-2"></i>Export Data</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="wa-tab" data-bs-toggle="tab" data-bs-target="#wa-pane" type="button"><i class="bi bi-whatsapp me-2"></i>Generate WA Report</button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="export-pane" role="tabpanel">
                <div class="card-custom">
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Tanggal Mulai</label>
                            <input type="date" id="filterStart" class="form-control" onchange="loadPreview()">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Tanggal Selesai</label>
                            <input type="date" id="filterEnd" class="form-control" onchange="loadPreview()">
                        </div>
                    </div>

                    <div class="check-group">
                        <label class="d-block mb-2 fw-bold small text-dark text-uppercase"><i class="bi bi-funnel-fill me-1"></i>Filter Status Penerbangan:</label>
                        <div class="d-flex gap-4 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="f_ops" checked onchange="loadPreview()">
                                <label class="form-check-label text-success fw-bold">Status OPS (Beroperasi)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="f_noops" checked onchange="loadPreview()">
                                <label class="form-check-label text-danger fw-bold">Status NO OPS (Batal)</label>
                            </div>
                        </div>

                        <hr class="border-secondary opacity-25 my-3">

                        <label class="d-block mb-2 fw-bold small text-dark text-uppercase"><i class="bi bi-layout-three-columns me-1"></i>Pilih Kolom Data Tambahan:</label>
                        <div class="row g-2">
                            <div class="col-6 col-md-3">
                                <div class="form-check"><input class="form-check-input" type="checkbox" id="c_bagasi" checked onchange="loadPreview()"><label class="form-check-label">Bagasi & Kargo</label></div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="form-check"><input class="form-check-input" type="checkbox" id="c_pax" checked onchange="loadPreview()"><label class="form-check-label">Pax & L/F</label></div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="form-check"><input class="form-check-input" type="checkbox" id="c_avio" checked onchange="loadPreview()"><label class="form-check-label">Pemakaian Avio</label></div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="form-check"><input class="form-check-input" type="checkbox" id="c_type" onchange="loadPreview()"><label class="form-check-label">Flight Type</label></div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="form-check"><input class="form-check-input" type="checkbox" id="c_otp" onchange="loadPreview()"><label class="form-check-label">OTP / Delay</label></div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="form-check"><input class="form-check-input" type="checkbox" id="c_ron" onchange="loadPreview()"><label class="form-check-label">Status RON</label></div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold m-0"><i class="bi bi-eye me-2"></i>Preview Data Export</h6>
                        <div class="btn-group">
                            <button class="btn btn-success btn-sm fw-bold" onclick="exportExcel()"><i class="bi bi-file-earmark-excel me-1"></i> Excel</button>
                            <button class="btn btn-outline-success btn-sm fw-bold" onclick="exportCSV()"><i class="bi bi-filetype-csv me-1"></i> CSV</button>
                        </div>
                    </div>

                    <div class="preview-container">
                        <table class="table table-sm table-preview table-hover text-center mb-0">
                            <thead id="p_head"></thead>
                            <tbody id="p_body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="wa-pane" role="tabpanel">
                <div class="card-custom">
                    <div class="d-flex gap-2 mb-3">
                        <input type="date" id="waDate" class="form-control" style="max-width: 200px;">
                        <button class="btn btn-primary fw-bold px-4" onclick="generateWA()"><i class="bi bi-lightning-charge-fill me-1"></i> Generate</button>
                    </div>
                    <textarea id="waTextarea" class="form-control bg-light" rows="18" style="font-size: 0.85rem; font-family: monospace; resize: none;" readonly placeholder="Klik Generate untuk memuat laporan..."></textarea>
                    <button class="btn btn-dark w-100 fw-bold mt-3" onclick="copyWA()"><i class="bi bi-clipboard-check me-2"></i>Salin Teks Laporan</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const supabaseUrl = 'https://hnlnkhbwbidthnupzhbp.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhubG5raGJ3YmlkdGhudXB6aGJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDE5NjYsImV4cCI6MjA5MzExNzk2Nn0.NZkxKilb-CwTx3ffmzc8_sVOaSgeulJAihJUxaoRTXI'; 
    let sbClient = window.supabase ? window.supabase.createClient(supabaseUrl, supabaseKey) : null;

    function toggleSidebar() { const s = document.getElementById('sidebar'); if (window.innerWidth <= 768) { s.classList.toggle('show'); document.getElementById('sidebarOverlay').classList.toggle('show'); } else { s.classList.toggle('collapsed'); } }

    // Helpers
    function getDelay(j, b) { if(!j || !b) return 0; let [jh,jm]=j.split(':').map(Number), [bh,bm]=b.split(':').map(Number); let d=(bh*60+bm)-(jh*60+jm); return d < -600 ? d+1440 : d; }
    function fmtTgl(d) { return new Date(d).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }
    function fmtHari(d) { return new Date(d).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' }); }

    // ==========================================
    // LOGIKA EXPORT & PREVIEW
    // ==========================================
    async function fetchFlights(s, e) {
        if(!sbClient) return [];
        let q = sbClient.from('daily_flights').select('*');
        if(s) q = q.gte('date', s); if(e) q = q.lte('date', e);
        const {data, error} = await q.order('date', {ascending:true}).order('jadwal', {ascending:true});
        return data || [];
    }

    function filterDataByStatus(data) {
        const showOps = document.getElementById('f_ops').checked;
        const showNoOps = document.getElementById('f_noops').checked;
        return data.filter(f => {
            if (f.status === 'OPS') return showOps;
            if (f.status === 'NO OPS') return showNoOps;
            return true;
        });
    }

    async function loadPreview() {
        const rawFlights = await fetchFlights(document.getElementById('filterStart').value, document.getElementById('filterEnd').value);
        const flights = filterDataByStatus(rawFlights);
        const h = document.getElementById('p_head'), b = document.getElementById('p_body');
        
        if(flights.length === 0) { h.innerHTML = ""; b.innerHTML = '<tr><td colspan="20" class="py-5 text-muted">Data tidak ditemukan atau semua filter dinonaktifkan.</td></tr>'; return; }

        const opt = {
            bag: document.getElementById('c_bagasi').checked, pax: document.getElementById('c_pax').checked,
            avio: document.getElementById('c_avio').checked, type: document.getElementById('c_type').checked,
            otp: document.getElementById('c_otp').checked, ron: document.getElementById('c_ron').checked
        };

        let headHtml = `<tr><th>Tanggal</th><th>CS</th><th>No. Fl</th><th>Rute</th><th>Leg</th><th>Tipe</th><th>Jadwal</th><th>Reg</th>`;
        if(opt.type) headHtml += `<th>AC Type</th><th>Flt Type</th>`; else headHtml += `<th>AC Type</th>`;
        if(opt.pax) headHtml += `<th>Pax</th><th>Seat</th><th>L/F</th>`;
        if(opt.bag) headHtml += `<th>Bagasi</th><th>Kargo</th>`;
        if(opt.avio) headHtml += `<th>Avio</th>`;
        if(opt.otp) headHtml += `<th>Block</th><th>Delay</th>`;
        if(opt.ron) headHtml += `<th>RON</th>`;
        headHtml += `<th>Status</th></tr>`;
        h.innerHTML = headHtml;

        b.innerHTML = flights.map(f => {
            let badgeLeg = f.leg === 'A' ? 'bg-primary' : (f.leg === 'D' ? 'bg-info text-dark' : 'bg-secondary');
            let badgeDom = f.dom_intl === 'INTL' ? 'bg-dark' : 'bg-secondary';
            let row = `<tr><td>${f.date}</td><td>${f.callsign||''}</td><td>${f.flight_number||''}</td><td>${f.rute||''}</td><td><span class="badge ${badgeLeg}">${f.leg||'-'}</span></td><td><span class="badge ${badgeDom}">${f.dom_intl||'-'}</span></td><td>${f.jadwal||''}</td><td>${f.reg||''}</td><td>${f.tipe_ac||''}</td>`;
            if(opt.type) row += `<td>${f.fl_type||''}</td>`;
            if(opt.pax) {
                let lf = f.seat > 0 ? ((f.pax/f.seat)*100).toFixed(1) + '%' : '-';
                row += `<td>${f.pax||0}</td><td>${f.seat||0}</td><td>${lf}</td>`;
            }
            if(opt.bag) row += `<td class="text-success fw-bold">${f.bagasi||0}</td><td class="text-secondary fw-bold">${f.kargo||0}</td>`;
            if(opt.avio) row += `<td>${f.avio ? 'YES' : 'NO'}</td>`;
            if(opt.otp) row += `<td>${f.block_time||'-'}</td><td>${getDelay(f.jadwal, f.block_time)}m</td>`;
            if(opt.ron) row += `<td>${f.ron ? 'YES' : 'NO'}</td>`;
            row += `<td><span class="badge ${f.status === 'OPS' ? 'bg-success' : 'bg-danger'}">${f.status}</span></td></tr>`;
            return row;
        }).join('');
    }

    async function exportExcel() {
        const rawFlights = await fetchFlights(document.getElementById('filterStart').value, document.getElementById('filterEnd').value);
        const flights = filterDataByStatus(rawFlights);
        if(flights.length === 0) return alert("Data kosong.");
        
        let html = `<table border="1">${document.getElementById('p_head').innerHTML}<tbody>${document.getElementById('p_body').innerHTML}</tbody></table>`;
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([html], { type: 'application/vnd.ms-excel' })); link.download = `Export_AMS_PKU.xls`; link.click();
    }

    async function exportCSV() {
        const rawFlights = await fetchFlights(document.getElementById('filterStart').value, document.getElementById('filterEnd').value);
        const flights = filterDataByStatus(rawFlights);
        if(flights.length === 0) return alert("Data kosong.");
        
        const opt = {
            bag: document.getElementById('c_bagasi').checked, pax: document.getElementById('c_pax').checked,
            avio: document.getElementById('c_avio').checked, type: document.getElementById('c_type').checked,
            otp: document.getElementById('c_otp').checked, ron: document.getElementById('c_ron').checked
        };

        let headers = ["Tanggal", "Callsign", "FlightNo", "Rute", "Leg", "Tipe", "Jadwal", "Reg", "TypeAC"];
        if(opt.type) headers.push("FlightType");
        if(opt.pax) headers.push("Pax", "Seat", "LF");
        if(opt.bag) headers.push("Bagasi(Kg)", "Kargo(Kg)");
        if(opt.avio) headers.push("Avio");
        if(opt.otp) headers.push("BlockTime", "Delay");
        if(opt.ron) headers.push("RON");
        headers.push("Status");

        let csv = headers.join(",") + "\n";
        flights.forEach(f => {
            let row = [f.date, f.callsign, f.flight_number, f.rute, f.leg, f.dom_intl, f.jadwal, f.reg, f.tipe_ac];
            if(opt.type) row.push(f.fl_type);
            if(opt.pax) row.push(f.pax, f.seat, f.seat > 0 ? (f.pax/f.seat*100).toFixed(1) : 0);
            if(opt.bag) row.push(f.bagasi, f.kargo);
            if(opt.avio) row.push(f.avio ? 1 : 0);
            if(opt.otp) row.push(f.block_time, getDelay(f.jadwal, f.block_time));
            if(opt.ron) row.push(f.ron ? 1 : 0);
            row.push(f.status);
            csv += row.join(",") + "\n";
        });
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); link.download = `Export_AMS_PKU.csv`; link.click();
    }

    // ==========================================
    // LOGIKA WA REPORT
    // ==========================================
    async function generateWA() {
        const d = document.getElementById('waDate').value; if(!d) return alert("Pilih tanggal!");
        const txt = document.getElementById('waTextarea'); txt.value = "Memuat data...";

        try {
            const { data: flights } = await sbClient.from('daily_flights').select('*').eq('date', d).order('jadwal', { ascending: true });
            const { data: rec } = await sbClient.from('daily_records').select('*').eq('date', d).maybeSingle();
            
            let prevDate = new Date(d); prevDate.setDate(prevDate.getDate() - 1);
            let prevDateStr = prevDate.toISOString().split('T')[0];
            const { data: pFlights } = await sbClient.from('daily_flights').select('pax, status').eq('date', prevDateStr);

            let daily = rec || {}, paxPrev = 0;
            if(pFlights) pFlights.forEach(f => { if(f.status === 'OPS') paxPrev += (parseInt(f.pax) || 0); });

            let plAD=0, plDD=0, reAD=0, reDD=0, plAI=0, plDI=0, reAI=0, reDI=0;
            let movMap = {}, paxMap = {}, paxToday = 0, bagToday = 0, kargoToday = 0;
            let onTime = 0, delay = 0, depTot = 0, cancel = [], delayList = [];

            (flights || []).forEach(f => {
                if (f.fl_type === 'REGULER') {
                    // Normalisasi input string agar tidak ada spasi sisa
                    let di_raw = (f.dom_intl || '').trim().toUpperCase();
                    if (f.leg === 'A' && di_raw === 'DOM') plAD++;
                    if (f.leg === 'D' && di_raw === 'DOM') plDD++;
                    if (f.leg === 'A' && di_raw === 'INTL') plAI++;
                    if (f.leg === 'D' && di_raw === 'INTL') plDI++;
                }

                if (f.status === 'OPS') {
                    // Normalisasi input string agar tidak ada spasi sisa
                    let di_raw = (f.dom_intl || '').trim().toUpperCase();
                    if (f.fl_type === 'REGULER') {
                        if (f.leg === 'A' && di_raw === 'DOM') reAD++;
                        if (f.leg === 'D' && di_raw === 'DOM') reDD++;
                        if (f.leg === 'A' && di_raw === 'INTL') reAI++;
                        if (f.leg === 'D' && di_raw === 'INTL') reDI++;
                    }

                    // --- PERBAIKAN: NORMALISASI STRING FL_TYPE AGAR TIDAK DOUBLE KARENA SPASI ---
                    let rawType = f.fl_type || 'UNKNOWN';
                    let t = rawType.trim().toUpperCase(); 
                    
                    let di = (di_raw === 'INTL') ? 'intl' : 'dom'; 
                    
                    if (!movMap[t]) movMap[t] = { dom: {a: 0, d: 0}, intl: {a: 0, d: 0} };
                    if (f.leg === 'A') movMap[t][di].a++; else movMap[t][di].d++;

                    if (!paxMap[t]) paxMap[t] = {
                        dom: { a: { p: 0, s: 0 }, d: { p: 0, s: 0 }, t: { p: 0, s: 0 } },
                        intl: { a: { p: 0, s: 0 }, d: { p: 0, s: 0 }, t: { p: 0, s: 0 } }
                    };
                    const paxVal = (parseInt(f.pax) || 0);
                    const seatVal = (parseInt(f.seat) || 0);
                    if (f.leg === 'A') {
                        paxMap[t][di].a.p += paxVal;
                        paxMap[t][di].a.s += seatVal;
                    } else if (f.leg === 'D') {
                        paxMap[t][di].d.p += paxVal;
                        paxMap[t][di].d.s += seatVal;
                    }
                    paxMap[t][di].t.p += paxVal;
                    paxMap[t][di].t.s += seatVal;

                    paxToday += paxVal;
                    bagToday += (parseInt(f.bagasi) || 0);
                    kargoToday += (parseInt(f.kargo) || 0);

                    if (f.leg === 'D') {
                        depTot++;
                        let diff = getDelay(f.jadwal, f.block_time);
                        if (diff <= 15) onTime++; else {
                            delay++;
                            if (diff > 30) delayList.push(`- ${f.callsign||''}${f.flight_number||''} (${f.rute||''}): Delay ${diff}m (STD: ${f.jadwal}, ATD: ${f.block_time})`);
                        }
                    }
                } else if (f.status === 'NO OPS') {
                    cancel.push(`${f.callsign||''}${f.flight_number||''} (${f.rute||''})`);
                }
            });

            // --- BUILDER STRING UNTUK MOVEMENT DOM/INTL ---
            let movStr = "", paxStr = "";
            let movGrandA = 0, movGrandD = 0;
            
            Object.keys(movMap).sort().forEach(k => {
                let m = movMap[k];
                let domA = m.dom.a, domD = m.dom.d, domT = domA + domD;
                let intlA = m.intl.a, intlD = m.intl.d, intlT = intlA + intlD;
                let totA = domA + intlA, totD = domD + intlD, totT = totA + totD;
                
                movGrandA += totA;
                movGrandD += totD;
                
                movStr += `- ${k}:\n`;
                let hasDom = (domT > 0);
                let hasIntl = (intlT > 0);
                
                if (hasDom || (!hasDom && !hasIntl)) {
                    movStr += `  [DOMESTIK] Arr ${domA} | Dep ${domD} | Total ${domT}\n`;
                }
                if (hasIntl) {
                    movStr += `  [INTERNASIONAL] Arr ${intlA} | Dep ${intlD} | Total ${intlT}\n`;
                }
                // HANYA MUNCULKAN TOTAL JIKA ADA CAMPURAN DOMESTIK & INTERNASIONAL 
                // (Untuk menghindari kesan "Double" jika isinya cuma satu tipe)
                if (hasDom && hasIntl) {
                    movStr += `  [TOTAL ${k}] Arr ${totA} | Dep ${totD} | Total ${totT}\n`;
                }
            });
            
            const movGrandT = movGrandA + movGrandD;
            if (movStr) {
                movStr += `- GRAND TOTAL MOVEMENT: Arr ${movGrandA} | Dep ${movGrandD} | Total ${movGrandT}\n`;
            }

            // --- BUILDER STRING UNTUK PAX, SEAT & L/F DOM/INTL ---
            Object.keys(paxMap).sort().forEach(k => {
                let p = paxMap[k];
                let domAp = p.dom.a.p, domAs = p.dom.a.s;
                let domDp = p.dom.d.p, domDs = p.dom.d.s;
                let domTp = p.dom.t.p, domTs = p.dom.t.s;
                
                let intlAp = p.intl.a.p, intlAs = p.intl.a.s;
                let intlDp = p.intl.d.p, intlDs = p.intl.d.s;
                let intlTp = p.intl.t.p, intlTs = p.intl.t.s;
                
                let totAp = domAp + intlAp, totAs = domAs + intlAs;
                let totDp = domDp + intlDp, totDs = domDs + intlDs;
                let totTp = domTp + intlTp, totTs = domTs + intlTs;
                
                let hasDom = domTs > 0 || domTp > 0;
                let hasIntl = intlTs > 0 || intlTp > 0;
                
                paxStr += `- ${k}\n`;
                
                if (hasDom || (!hasDom && !hasIntl)) {
                    let lfA = domAs > 0 ? ((domAp / domAs) * 100).toFixed(1) : 0;
                    let lfD = domDs > 0 ? ((domDp / domDs) * 100).toFixed(1) : 0;
                    let lfT = domTs > 0 ? ((domTp / domTs) * 100).toFixed(1) : 0;
                    paxStr += `  [DOMESTIK]\n`;
                    paxStr += `  Arr: Pax ${domAp.toLocaleString('id-ID')} | Seat ${domAs.toLocaleString('id-ID')} | L/F ${lfA}%\n`;
                    paxStr += `  Dep: Pax ${domDp.toLocaleString('id-ID')} | Seat ${domDs.toLocaleString('id-ID')} | L/F ${lfD}%\n`;
                    paxStr += `  Tot: Pax ${domTp.toLocaleString('id-ID')} | Seat ${domTs.toLocaleString('id-ID')} | L/F ${lfT}%\n`;
                }
                
                if (hasIntl) {
                    let lfA = intlAs > 0 ? ((intlAp / intlAs) * 100).toFixed(1) : 0;
                    let lfD = intlDs > 0 ? ((intlDp / intlDs) * 100).toFixed(1) : 0;
                    let lfT = intlTs > 0 ? ((intlTp / intlTs) * 100).toFixed(1) : 0;
                    paxStr += `  [INTERNASIONAL]\n`;
                    paxStr += `  Arr: Pax ${intlAp.toLocaleString('id-ID')} | Seat ${intlAs.toLocaleString('id-ID')} | L/F ${lfA}%\n`;
                    paxStr += `  Dep: Pax ${intlDp.toLocaleString('id-ID')} | Seat ${intlDs.toLocaleString('id-ID')} | L/F ${lfD}%\n`;
                    paxStr += `  Tot: Pax ${intlTp.toLocaleString('id-ID')} | Seat ${intlTs.toLocaleString('id-ID')} | L/F ${lfT}%\n`;
                }
                
                // HANYA MUNCULKAN TOTAL JIKA ADA CAMPURAN DOMESTIK & INTERNASIONAL 
                if (hasDom && hasIntl) {
                    let lfAtot = totAs > 0 ? ((totAp / totAs) * 100).toFixed(1) : 0;
                    let lfDtot = totDs > 0 ? ((totDp / totDs) * 100).toFixed(1) : 0;
                    let lfTtot = totTs > 0 ? ((totTp / totTs) * 100).toFixed(1) : 0;
                    
                    paxStr += `  [TOTAL ${k}]\n`;
                    paxStr += `  Arr: Pax ${totAp.toLocaleString('id-ID')} | Seat ${totAs.toLocaleString('id-ID')} | L/F ${lfAtot}%\n`;
                    paxStr += `  Dep: Pax ${totDp.toLocaleString('id-ID')} | Seat ${totDs.toLocaleString('id-ID')} | L/F ${lfDtot}%\n`;
                    paxStr += `  Tot: Pax ${totTp.toLocaleString('id-ID')} | Seat ${totTs.toLocaleString('id-ID')} | L/F ${lfTtot}%\n`;
                }
            });

            let otp = depTot > 0 ? ((onTime / depTot) * 100).toFixed(1) : 100;

            txt.value = `*LAPORAN OPERASIONAL AMS - BANDARA SSK II*
Tanggal: ${fmtTgl(d)}
DOS: ${daily.dos || "-"}

*1. SLOT PLANNING VS REALISASI (REGULER)*
[DOMESTIK]
- Planning  : Arr ${plAD} | Dep ${plDD} | Total ${plAD + plDD}
- Realisasi : Arr ${reAD} | Dep ${reDD} | Total ${reAD + reDD}
[INTERNASIONAL]
- Planning  : Arr ${plAI} | Dep ${plDI} | Total ${plAI + plDI}
- Realisasi : Arr ${reAI} | Dep ${reDI} | Total ${reAI + reDI}
[TOTAL]
- Planning  : Arr ${plAD + plAI} | Dep ${plDD + plDI} | Total ${plAD + plDD + plAI + plDI}
- Realisasi : Arr ${reAD + reAI} | Dep ${reDD + reDI} | Total ${reAD + reDD + reAI + reDI}

*2. ACTUAL MOVEMENT (BY FLIGHT TYPE)*
${movStr || "- Nihil\n"}
*3. ACTUAL PAX, SEAT & L/F (BY FLIGHT TYPE)*
${paxStr || "- Nihil\n"}
*4. REKAPITULASI PAX, BAGASI & OTP*
- TOTAL PAX HARI INI: ${paxToday.toLocaleString('id-ID')}
- TOTAL BAGASI HARI INI: ${bagToday.toLocaleString('id-ID')} Kg
- TOTAL KARGO HARI INI: ${kargoToday.toLocaleString('id-ID')} Kg
- TOTAL PAX KEMARIN (${fmtHari(prevDateStr)}): ${paxPrev.toLocaleString('id-ID')}
- Tepat Waktu (<15m): ${onTime} Flight
- Delay (>15m): ${delay} Flight
- Persentase OTP: ${otp}%

*5. CANCEL FLIGHT (NO OPS)*
- Total: ${cancel.length} Flight
- Detail: ${cancel.length > 0 ? cancel.join(", ") : "Nihil"}

*6. KETERANGAN / DELAY > 30 MENIT*
${delayList.length > 0 ? delayList.join("\n") : "- Nihil"}

*PETUGAS SHIFT PAGI*
- PTO: ${daily.pto_pagi || "-"}
- Pelaksana: ${(daily.pelaksana_pagi || []).join(", ") || "-"}

*PETUGAS SHIFT MALAM*
- PTO: ${daily.pto_malam || "-"}
- Pelaksana: ${(daily.pelaksana_malam || []).join(", ") || "-"}`;

        } catch (e) { txt.value = "Error: " + e.message; console.error(e); }
    }

    function copyWA() { const t = document.getElementById('waTextarea'); if(!t.value) return; t.select(); navigator.clipboard.writeText(t.value).then(() => alert("Tersalin!")).catch(e => alert("Gagal menyalin.")); }
    async function logout() { if(!sbClient) return; await sbClient.auth.signOut(); window.location.replace('index.html'); }

    window.onload = () => {
        let t = new Date().toISOString().split('T')[0];
        document.getElementById('filterStart').value = t; 
        document.getElementById('filterEnd').value = t; 
        document.getElementById('waDate').value = t;
        loadPreview();
    };
</script>
</body>
</html>
